appId: com.razeandrise.app
---
# Session persistence: session survives app kill + relaunch
# Assumes user is already signed in
- launchApp
- assertVisible: "Welcome"
# Simulate app kill by terminating and relaunching
- stopApp
- launchApp
- waitForAnimationToEnd
# Session restored — user sees Dashboard, not auth screen
- assertVisible: "Welcome"
# If auth screen appears here, MMKV/SecureStore session restore failed
# Check: src/lib/storage.ts initStorage() and supabaseStorageAdapter
